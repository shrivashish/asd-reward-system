<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Star Board — UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<style>
  body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .phone {
    width: 412px; height: 760px;
    background: var(--surface);
    border-radius: 40px;
    box-shadow: 0 24px 70px rgba(31,58,56,.22);
    border: 10px solid #1b2728;
    overflow: hidden;
    display: flex;
  }
  #sb-app { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #sb-root { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  /* hide scrollbars for a cleaner device look */
  main::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
  <div class="phone"><div id="sb-app"><div id="sb-root"></div></div></div>
  <script src="data.js"></script>
  <script type="text/babel" src="screens-child.jsx"></script>
  <script type="text/babel" src="screens-parent.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
