<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4 · 8 · 12 · 16 · 20 · 24 · 32 — 16px is the default" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--surface); padding: 20px; font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .it { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--teal); border-radius: 4px; width: 26px; }
  .lab { font-size: 10px; color: var(--ink-soft); font-weight: 700; }
</style></head>
<body>
  <div class="row">
    <div class="it"><div class="bar" style="height:4px"></div><span class="lab">1 · 4</span></div>
    <div class="it"><div class="bar" style="height:8px"></div><span class="lab">2 · 8</span></div>
    <div class="it"><div class="bar" style="height:12px"></div><span class="lab">3 · 12</span></div>
    <div class="it"><div class="bar" style="height:16px"></div><span class="lab">4 · 16</span></div>
    <div class="it"><div class="bar" style="height:20px"></div><span class="lab">5 · 20</span></div>
    <div class="it"><div class="bar" style="height:24px"></div><span class="lab">6 · 24</span></div>
    <div class="it"><div class="bar" style="height:32px"></div><span class="lab">8 · 32</span></div>
  </div>
</body></html>
