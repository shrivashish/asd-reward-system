<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--surface); padding: 24px; font-family: var(--font-body); display: flex; align-items: center; gap: 24px; }
  .tile { background: var(--bg); border-radius: var(--radius-lg); padding: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
  .note { font-size: 13px; color: var(--ink-soft); max-width: 360px; line-height: 1.5; }
  .b { color: var(--ink); font-weight: 800; }
</style></head>
<body>
  <div class="tile"><img src="../assets/star-mark.svg" alt="Star Board mark" width="56" height="56" /></div>
  <div class="tile"><img src="../assets/star-mark.svg" alt="Star Board mark" width="32" height="32" /></div>
  <p class="note"><span class="b">The gold star</span> (#F2B632) is the brand's atom — the favicon, the app icon, and the literal currency children earn. Used as the ★ glyph throughout the UI.</p>
</body></html>
