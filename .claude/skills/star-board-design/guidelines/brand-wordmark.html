<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--surface); padding: 24px; font-family: var(--font-body); display: flex; flex-direction: column; gap: 16px; }
  .mark { font-family: var(--font-display); font-weight: 600; color: var(--teal); display: inline-flex; align-items: center; gap: 6px; }
  .onbg { background: var(--bg); padding: 14px 18px; border-radius: var(--radius); display: inline-flex; }
  .ondark { background: var(--ink); padding: 14px 18px; border-radius: var(--radius); display: inline-flex; }
  .ondark .mark { color: #fff; }
</style></head>
<body>
  <span class="mark" style="font-size:30px">⭐ Star Board</span>
  <div style="display:flex;gap:14px;align-items:center">
    <span class="onbg"><span class="mark" style="font-size:20px">⭐ Star Board</span></span>
    <span class="ondark"><span class="mark" style="font-size:20px">⭐ Star Board</span></span>
  </div>
</body></html>
