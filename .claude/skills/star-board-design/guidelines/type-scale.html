<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="11 → 48px; large by default, image-first product" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--surface); padding: 20px; font-family: var(--font-body); color: var(--ink); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .r:last-child { border-bottom: none; }
  .v { color: var(--ink-soft); font-size: 11px; font-weight: 700; width: 130px; flex-shrink: 0; }
  .s { color: var(--ink); }
</style></head>
<body>
  <div class="r"><span class="v">--text-4xl · 48</span><span class="s" style="font-family:var(--font-display);font-size:48px;font-weight:600">+3 ★</span></div>
  <div class="r"><span class="v">--text-2xl · 26</span><span class="s" style="font-family:var(--font-display);font-size:26px;font-weight:600">Screen title</span></div>
  <div class="r"><span class="v">--text-lg · 20</span><span class="s" style="font-family:var(--font-display);font-size:20px;font-weight:600">Card title</span></div>
  <div class="r"><span class="v">--text-base · 16</span><span class="s" style="font-size:16px">Body copy — the default reading size</span></div>
  <div class="r"><span class="v">--text-sm · 13</span><span class="s" style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft)">Field label</span></div>
  <div class="r"><span class="v">--text-xs · 12</span><span class="s" style="font-size:12px;color:var(--ink-soft)">Nav label / caption</span></div>
</body></html>
